<svg width="40" height="40" viewBox="0 0 40 40"
     xmlns="http://www.w3.org/2000/svg">
  <style>
    .outer {
      animation: spin 12s linear infinite;
      transform-origin: 20px 20px;
    }
    .inner {
      animation: spinReverse 18s linear infinite;
      transform-origin: 20px 20px;
    }
    .core {
      animation: pulse 2.8s ease-in-out infinite;
      transform-origin: 20px 20px;
    }
    .spiral {
      animation: flicker 3.5s ease-in-out infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes spinReverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 0.8; }
      50%       { transform: scale(1.18); opacity: 1;   }
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.9;  }
      40%       { opacity: 0.55; }
      60%       { opacity: 1;   }
    }
  </style>
  <defs>
    <!-- Default cyan-green gradient -->
    <linearGradient id="poiGrad" x1="10" y1="8" x2="30" y2="32"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00C8FF"/>
      <stop offset="1" stop-color="#00FF99"/>
    </linearGradient>
    <!-- Gold gradient for visited state -->
    <linearGradient id="poiGradGold" x1="10" y1="8" x2="30" y2="32"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#FFA500"/>
    </linearGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Golden glow filter -->
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cyan glow filter -->
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#00C8FF" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle class="outer"
          cx="20" cy="20" r="15"
          fill="none"
          stroke="url(#poiGrad)"
          stroke-width="3.2"
          stroke-linecap="round"
          stroke-dasharray="60 35"
          filter="url(#cyanGlow)"/>

  <!-- Inner ring -->
  <circle class="inner"
          cx="20" cy="20" r="11"
          fill="none"
          stroke="url(#poiGrad)"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-dasharray="42 28"
          opacity="0.9"/>

  <!-- Notches -->
  <g fill="#021018" opacity="0.55">
    <rect x="19" y="3.2" width="2" height="3.4" rx="1"/>
    <rect x="6.2" y="27.4" width="2" height="3.4" rx="1"
          transform="rotate(-40 7.2 29.1)"/>
    <rect x="31.8" y="27.4" width="2" height="3.4" rx="1"
          transform="rotate(40 32.8 29.1)"/>
  </g>

  <!-- Spiral -->
  <path class="spiral"
        d="M20 10
           C 25 10, 28.5 13.5, 28.5 18
           C 28.5 22.5, 25.2 25.5, 21 25.5
           C 17.5 25.5, 15.2 23.4, 15.2 20.6
           C 15.2 18.2, 17 16.7, 18.8 16.7
           C 20.6 16.7, 21.9 18, 21.9 19.6
           C 21.9 21.1, 20.9 22.1, 19.7 22.3"
        fill="none"
        stroke="#EFFFFF"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.95"/>

  <!-- Core glow -->
  <circle class="core" cx="20" cy="20" r="5.2"
          fill="url(#coreGrad)" opacity="0.9"/>
  <circle class="core" cx="20" cy="20" r="2.2"
          fill="#FFFFFF" opacity="0.95"/>
</svg>
